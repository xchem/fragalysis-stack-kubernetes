---
namespaceOverride: monitoring
prometheusOperator:
  priorityClassName: im-application-critical
prometheus:
  prometheusSpec:
    priorityClassName: im-application-critical
    additionalScrapeConfigs:
    - job_name: stack-alan-default
      scheme: https
      scrape_interval: 10s
      static_configs:
      - targets:
        - fragalysis-alan-default.xchem-dev.diamond.ac.uk
        labels:
          app: alan-default
    - job_name: stack-kalev-default
      scheme: https
      scrape_interval: 10s
      static_configs:
      - targets:
        - fragalysis-kalev-default.xchem-dev.diamond.ac.uk
        labels:
          app: kalev-default
    - job_name: stack-tibor-default
      scheme: https
      scrape_interval: 10s
      static_configs:
      - targets:
        - fragalysis-tibor-default.xchem-dev.diamond.ac.uk
        labels:
          app: tibor-default
    - job_name: stack-simona-default
      scheme: https
      scrape_interval: 10s
      static_configs:
      - targets:
        - fragalysis-simona-default.xchem-dev.diamond.ac.uk
        labels:
          app: simona-default
    - job_name: stack-samuel-default
      scheme: https
      scrape_interval: 10s
      static_configs:
      - targets:
        - fragalysis-samuel-default.xchem-dev.diamond.ac.uk
        labels:
          app: samuel-default
prometheus-node-exporter:
  namespaceOverride: monitoring
thanosRuler:
  thanosRulerSpec:
    priorityClassName: im-application-critical
alertmanager:
  namespaceOverride: monitoring
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-nginx-production
      kubernetes.io/tls-acme: "true"
    hosts:
    - alartmanager.xchem-dev.diamond.ac.uk
    tls:
    - secretName: alartmanager-general-tls
      hosts:
      - alartmanager.xchem-dev.diamond.ac.uk
  alertmanagerSpec:
    priorityClassName: im-application-critical
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: csi-cinder-sc-delete
          accessModes:
          - "ReadWriteOnce"
          resources:
            requests:
              storage: 5Gi
grafana:
  namespaceOverride: monitoring
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-nginx-production
      kubernetes.io/tls-acme: "true"
    hosts:
    - grafana.xchem-dev.diamond.ac.uk
    tls:
    - secretName: grafana-general-tls
      hosts:
      - grafana.xchem-dev.diamond.ac.uk
  persistence:
    enabled: true
    type: pvc
    accessModes:
    - ReadWriteOnce
    size: 5Gi
    storageClassName: csi-cinder-sc-delete
