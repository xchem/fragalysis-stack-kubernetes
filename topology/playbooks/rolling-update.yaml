---

# Apply package updates to machines one at a time, rebooting each and
# waiting for it to return to an operating state before moving to the next.
#
# 'serial: 1' guarantees a strict one-host-at-a-time rollout: the play does
# not advance to the next host until the current one has updated, rebooted
# and become reachable again. The ansible.builtin.reboot module performs the
# reboot AND blocks until the host responds to a test command, so it handles
# the "wait for it to come back" step for us.
#
# Update every host in the inventory: -
#
#   ansible-playbook playbooks/rolling-update.yaml
#
# Update a single group (e.g. the dev nodes): -
#
#   ansible-playbook playbooks/rolling-update.yaml --limit xch_dev
#
# Update a single host: -
#
#   ansible-playbook playbooks/rolling-update.yaml --limit 192.168.253.132
#
# By default a host is only rebooted when the package update says one is
# required (/var/run/reboot-required). Force a reboot of every host with: -
#
#   ansible-playbook playbooks/rolling-update.yaml --extra-vars reboot_force=true

- name: Rolling update and reboot
  hosts: all
  become: true
  serial: 1
  vars:
    # Reboot even if the system does not report one as required
    reboot_force: false
    # How long (seconds) to wait for a host to come back before failing
    reboot_timeout: 600

  tasks:

  # Update the cache with the apt-get CLI rather than the apt module. The
  # module updates via python3-apt, which is stricter than the CLI: if one
  # repo fails to fetch, python3-apt raises (reported as the unhelpful
  # "Failed to update apt cache: unknown reason") whereas 'apt-get update'
  # prints a W: warning and exits 0, failing only on a genuine E: error.
  # This matches the behaviour of a manual 'sudo apt update'.
  - name: Update apt cache
    ansible.builtin.command: apt-get update
    register: apt_update
    changed_when: true

  - name: Upgrade all packages
    ansible.builtin.apt:
      upgrade: dist

  - name: Remove unused dependencies
    ansible.builtin.apt:
      autoremove: true

  - name: Check whether a reboot is required
    ansible.builtin.stat:
      path: /var/run/reboot-required
    register: reboot_required_file

  - name: Reboot and wait for the host to return to an operating state
    when: reboot_force or reboot_required_file.stat.exists
    ansible.builtin.reboot:
      reboot_timeout: "{{ reboot_timeout }}"
      msg: Rebooting after package update (ansible rolling-update)
